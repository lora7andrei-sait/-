        .booking-widget .booking__container {

        .booking-widget input:focus {
            outline: none;
            border-color: var(--color-accent-primary);
        }

        .booking-widget input.error {
            border-color: #e74c3c;
        }

        .booking-widget .field-error {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 4px;
            display: none;
            text-align: left;
        }

        .booking-widget .field-error.visible {
            display: block;
        }

        .booking-widget .form-policy {
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            text-align: center;
        }

        .booking-widget .success-message {
            display: none;
            text-align: center;
            padding: 48px 40px;
            background: #E8F5E9;
            color: #2E7D32;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
        }

        .booking-widget .success-message h3 {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 16px;
            color: #1B5E20;
        }

        .booking-widget .success-message.visible {
            display: block;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .booking-widget .booking__container {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }

        @media (max-width: 600px) {
            .booking-widget .form-row {
                grid-template-columns: 1fr;
            }

            .booking-widget .booking__form {
                padding: 32px 24px;
            }
        }

<script>
    const form = document.getElementById('registration-form');
    const photoInput = document.getElementById('photo-input');
    const uploadText = document.getElementById('upload-text');
    const submitBtn = document.getElementById('submit-btn');

    const emptyState = document.getElementById('empty-state');
    const previewPanel = document.getElementById('preview-panel');
    const downloadBtn = document.getElementById('download-btn');

    let currentObjectData = null; // Для сохранения архива

    // Компрессия фото (чтобы память не лопнула)
    function compressImage(file, maxSize = 1200) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > h && w > maxSize) { h = Math.round(h * (maxSize / w)); w = maxSize; }
                    else if (h > maxSize) { w = Math.round(w * (maxSize / h)); h = maxSize; }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.8)); // 80% качество
                };
            };
        });
    }

    // Текст при выборе фото
    photoInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            uploadText.innerText = 'Подготовлено фото: ' + e.target.files.length;
            uploadText.classList.add('text-brand-600');
            document.getElementById('drop-zone').classList.add('border-brand-500', 'bg-brand-50/70');
        }
    });

    // Генерация превью (Сабмит формы)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const origText = document.getElementById('submit-text').innerText;
        document.getElementById('submit-text').innerText = 'Обработка данных...';
        submitBtn.disabled = true;

        try {
            const fd = new FormData(form);
            
            // Обработка фотографий
            const photosArray = [];
            for (let i = 0; i < photoInput.files.length; i++) {
                if(photoInput.files[i].type.startsWith('image/')) {
                    photosArray.push(await compressImage(photoInput.files[i]));
                }
            }

            // Данные объекта
            currentObjectData = {
                title: fd.get('title'), type: fd.get('type'), price: fd.get('price'),
                guests: fd.get('guests'), rooms: fd.get('rooms'),
                floor: fd.get('floor'), total_floors: fd.get('total_floors'),
                description: fd.get('description'),
                contact_name: fd.get('contact_name'), phone: fd.get('phone'),
                photos: photosArray
            };

            // ЗАПОЛНЕНИЕ ШАБЛОНА ПОЛЕ ЗА ПОЛЕМ
            document.getElementById('prev-title').innerText = currentObjectData.title;
            document.getElementById('prev-type').innerText = currentObjectData.type;
            document.getElementById('prev-price').innerText = Number(currentObjectData.price).toLocaleString('ru-RU');
            document.getElementById('prev-guests').innerText = currentObjectData.guests;
            document.getElementById('prev-rooms').innerText = currentObjectData.rooms;
            document.getElementById('prev-floor').innerText = currentObjectData.floor;
            document.getElementById('prev-total-floors').innerText = currentObjectData.total_floors;
            document.getElementById('prev-desc').innerText = currentObjectData.description;
            document.getElementById('prev-contact').innerText = currentObjectData.contact_name;
            document.getElementById('prev-phone').innerText = currentObjectData.phone;

            // ЗАПОЛНЕНИЕ КАРТИНОК В ШАБЛОНЕ
            const mainImg = document.getElementById('prev-main-img');
            const noImg = document.getElementById('prev-no-img');
            const countBtn = document.getElementById('prev-gallery-count');
            
            if (photosArray.length > 0) {
                mainImg.style.backgroundImage = `url(${photosArray[0]})`;
                noImg.classList.add('hidden');
                mainImg.classList.remove('bg-slate-200');
                
                if(photosArray.length > 1) {
                    document.getElementById('prev-photo-count').innerText = photosArray.length - 1;
                    countBtn.classList.remove('hidden');
                    countBtn.classList.add('flex');
                } else { 
                    countBtn.classList.add('hidden'); 
                    countBtn.classList.remove('flex');  
                }
            } else {
                mainImg.style.backgroundImage = 'none';
                mainImg.classList.add('bg-slate-200');
                noImg.classList.remove('hidden');
                countBtn.classList.add('hidden');
            }

            // Переключаем экраны справа
            emptyState.classList.add('hidden');
            previewPanel.classList.remove('hidden');
            
            // Показываем кнопку скачивания ZIP
            downloadBtn.classList.remove('hidden');
            downloadBtn.classList.add('flex');

            // Анимация успеха на кнопке
            document.getElementById('submit-text').innerText = 'Сгенерировано успешно!';
            submitBtn.classList.replace('bg-slate-900', 'bg-brand-500');
            
            setTimeout(() => { 
                document.getElementById('submit-text').innerText = origText; 
                submitBtn.disabled = false; 
                submitBtn.classList.replace('bg-brand-500', 'bg-slate-900');
            }, 2000);

        } catch (error) {
            alert('Слишком большие фото. Выберите меньше или сожмите их.');
            document.getElementById('submit-text').innerText = origText; 
            submitBtn.disabled = false;
        }
    });

    // ==========================================
    // ЛОГИКА ЗАЩИЩЕННОЙ ВЫГРУЗКИ В .ZIP (Пароль: Andy777)
    // ==========================================
    downloadBtn.addEventListener('click', () => {
        if(!currentObjectData) return;
        
        const pwd = prompt('Введите защитный код для скачивания (Andy777):');
        
        if (pwd === 'Andy777') {
            
            const btnText = document.getElementById('download-text');
            const txt = btnText.innerText;
            btnText.innerText = 'Сборка архива...';
            downloadBtn.disabled = true;

            setTimeout(() => {
                const zip = new JSZip();
                
                // 1. Формируем красивый текстовый файл с описанием
                let text = 'ИНФОРМАЦИОННАЯ КАРТОЧКА ОБЪЕКТА\n';
                text += '=======================================\n\n';
                text += `Название:  ${currentObjectData.title}\n`;
                text += `Категория: ${currentObjectData.type}\n`;
                text += `Стоимость: ${currentObjectData.price} руб / сутки\n\n`;
                
                text += 'ОСНОВНЫЕ ПАРАМЕТРЫ\n';
                text += '---------------------------------------\n';
                text += `- Вместимость: ${currentObjectData.guests} чел.\n`;
                text += `- Комнат:      ${currentObjectData.rooms}\n`;
                text += `- Этажность:   Этаж ${currentObjectData.floor} из ${currentObjectData.total_floors}\n\n`;
                
                text += 'ПОЛНОЕ ОПИСАНИЕ ОБЪЕКТА\n';
                text += '---------------------------------------\n';
                text += `${currentObjectData.description}\n\n`;
                
                text += 'КОНТАКТНЫЕ ДАННЫЕ\n';
                text += '---------------------------------------\n';
                text += `Владелец / Агент: ${currentObjectData.contact_name}\n`;
                text += `Телефон связи:    ${currentObjectData.phone}\n`;
                
                // Кладем текст в ZIP архив
                zip.file("1 Описание Объекта.txt", text);

                // 2. Кладем все фотографии в ZIP архив
                if (currentObjectData.photos && currentObjectData.photos.length > 0) {
                    currentObjectData.photos.forEach((base64Url, index) => {
                        // Очищаем префикс base64: "data:image/jpeg;base64,"
                        const base64Data = base64Url.split(',')[1];
                        zip.file(`Фото ${index + 1}.jpg`, base64Data, {base64: true});
                    });
                }

                // 3. Собираем и отдаем пользователю ZIP
                // Безопасное имя файла без запрещенных символов
                const safeName = currentObjectData.title.replace(/[\/\\:*?"<>|]/g, "_");
                
                zip.generateAsync({type:"blob"}).then(function(content) {
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Объект [${safeName}].zip`; 
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    btnText.innerText = txt;
                    downloadBtn.disabled = false;
                    alert('Доступ разрешен. Скачивание ZIP-архива началось!');
                });
            }, 500);

        } else if (pwd !== null) {
            alert('Ошибка доступа! Неверный пароль.');
        }
    });

</script>
